    <main>

        <h2>Entre em contato</h2>
        <p>Fale conosco para tirar dúvidas ou começar seu projeto.</p>

        <div id="noticiaPrincipal">
            <form>
                <b>Escreva seu nome</b><br>
                <input type="text" id="nome" placeholder="Nome">
                <p id="mensagemNome"></p>

                <b>Escreva seu email</b><br>
                <input type="email" id="email" placeholder="Email">
                <p id="mensagemEmail"></p>

                <b>Escreva seu telefone</b><br>
                <input type="text" id="telefone" placeholder="(19)999999999">
                <p id="mensagemTelefone"></p>

                <b>Escreva sua mensagem</b><br>
                <textarea placeholder="Mensagem"></textarea>

                <br>

                <button type="submit">Enviar</button>

            </form>
        </div>

    </main>

    <footer>
        <p>NewsToday © 2026</p> <br><br>
        <p>Envie uma notícia</p>
    </footer>

    <script src="script.js"></script>
