<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nike</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logonike.png" type="image/png">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">NIKE</div>

    <nav>
      <a href="#">Seleções</a>
      <a href="#">Dia das Mães</a>
      <a href="#">Lançamentos</a>
      <a href="#">Masculino</a>
      <a href="#">Feminino</a>
      <a href="#">Infantil</a>
      <a href="#">SNKRS</a>
    </nav>

    <!-- ícones -->
    <div class="icons">

      <!-- search -->
      <svg width="20" height="20" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" stroke="black" fill="none" />
        <line x1="16" y1="16" x2="22" y2="22" stroke="black" />
      </svg>

      <!-- heart -->
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M12 21s-6-4.35-9-8.28C1 9.5 3.5 6 7 6c2 0 3 1 5 3 2-2 3-3 5-3 3.5 0 6 3.5 4 6.72C18 16.65 12 21 12 21z"
          stroke="black" fill="none" />
      </svg>

      <!-- cart -->
      <svg width="20" height="20" viewBox="0 0 24 24">
        <circle cx="9" cy="20" r="1" />
        <circle cx="18" cy="20" r="1" />
        <path d="M2 2h3l3 12h10l3-8H6" stroke="black" fill="none" />
      </svg>
    </div>
  </header>

  <!-- banner principal -->
  <section class="banner">
    <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="">
    <div class="banner-text">
      <h1>POTÊNCIA MÁXIMA</h1>
      <p>Sinta a força do Air Zoom</p>
    </div>
  </section>

  <!-- Cards embaixo do banner -->
  <section class="grid">

    <div class="card">
      <img
        src="https://images.pexels.com/photos/416778/pexels-photo-416778.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1"
        alt="">
      <div class="text">
        <p>Dia das Mães</p>
        <h2>25% OFF com cupom MAES25</h2>
        <button>Comprar</button>
      </div>
    </div>

    <div class="card">
      <img src="https://down-br.img.susercontent.com/file/2ad799cf82e62ca9363d57718a8b68e5" alt="">
      <div class="text">
        <p>Novo Lançamento</p>
        <h2>Nike Bolha Air Max 97 </h2>
        <button>Comprar</button>
      </div>


    </div>
  </section>

</body>

</html>
